name: Release CI
on:
  push:
    branches:
      - master
      - alpha
      - beta
      - rc

permissions:
  id-token: write # Required for OIDC
  contents: write # Required for semantic-release to push tags and commits
  issues: write # Required for semantic-release to create issues
  pull-requests: write # Required for semantic-release to comment on PRs

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install deps
        run: pnpm install

      - name: CI
        run: pnpm run ci

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Disable git hooks in CI
        run: git config core.hooksPath /dev/null

      - name: Release
        run: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}