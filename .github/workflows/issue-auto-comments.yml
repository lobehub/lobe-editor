name: Issue Auto Comment
on:
  issues:
    types:
      - opened
      - closed
      - assigned
  pull_request_target:
    types:
      - opened
      - closed

permissions:
  contents: read

jobs:
  run:
    permissions:
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Comment and maintain labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;

            const createIssueComment = (issue_number, body) =>
              github.rest.issues.createComment({ owner, repo, issue_number, body });
            const lines = (...content) => content.join('\n');

            if (context.eventName === 'issues') {
              const issue = context.payload.issue;
              const author = issue.user.login;

              if (context.payload.action === 'opened') {
                await createIssueComment(
                  issue.number,
                  lines(
                    `👀 @${author}`,
                    'Thank you for raising an issue. We will investigate into the matter and get back to you as soon as possible.',
                    'Please make sure you have given us as much context as possible.\\',
                    '非常感谢您提交 issue。我们会尽快调查此事，并尽快回复您。 请确保您已经提供了尽可能多的背景信息。',
                  ),
                );
                return;
              }

              if (context.payload.action === 'closed') {
                await createIssueComment(
                  issue.number,
                  lines(
                    `✅ @${author}`,
                    '<br/>',
                    'This issue is closed, If you have any questions, you can comment and reply.\\',
                    '此问题已经关闭。如果您有任何问题，可以留言并回复。',
                  ),
                );
                return;
              }

              if (issue.state === 'open' && context.actor === author) {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issue.number,
                  name: 'Inactive',
                }).catch((error) => {
                  if (error.status !== 404) throw error;
                });
              }

              return;
            }

            if (context.eventName !== 'pull_request_target') return;

            const pullRequest = context.payload.pull_request;
            const author = pullRequest.user.login;

            if (context.payload.action === 'opened') {
              await createIssueComment(
                pullRequest.number,
                lines(
                  `👍 @${author}`,
                  '<br>',
                  'Thank you for raising your pull request and contributing to our Community',
                  'Please make sure you have followed our contributing guidelines. We will review it as soon as possible.',
                  'If you encounter any problems, please feel free to connect with us.\\',
                  '非常感谢您提出拉取请求并为我们的社区做出贡献，请确保您已经遵循了我们的贡献指南，我们会尽快审查它。',
                  '如果您遇到任何问题，请随时与我们联系。',
                ),
              );
              return;
            }

            if (context.payload.action === 'closed' && pullRequest.merged) {
              await createIssueComment(
                pullRequest.number,
                lines(
                  `❤️ Great PR @${author} ❤️`,
                  '<br>',
                  'The growth of project is inseparable from user feedback and contribution, thanks for your contribution!\\',
                  '项目的成长离不开用户反馈和贡献，感谢您的贡献!',
                ),
              );
            }
